<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MovieView - Stream Movies & Series</title>
    <!-- Preconnect to video domains for faster streaming -->
    <link rel="preconnect" href="https://www.vidking.net" crossorigin>
    <link rel="dns-prefetch" href="https://www.vidking.net">
    <link rel="preconnect" href="https://api.themoviedb.org" crossorigin>
    <link rel="dns-prefetch" href="https://api.themoviedb.org">
    <link rel="preconnect" href="https://image.tmdb.org" crossorigin>
    <link rel="dns-prefetch" href="https://image.tmdb.org">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="container">
            <div class="nav-brand">
                <a href="#" onclick="goHome(); return false;"><h1>🎬 MovieView</h1></a>
            </div>
            <div class="nav-search">
                <input 
                    type="text" 
                    id="searchInput" 
                    class="search-input" 
                    placeholder="Search movies & series..."
                >
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="container">
        <!-- Player Section -->
        <section class="player-section" id="playerSection" style="display: none;">
            <button class="back-button" onclick="goBack()">← Back</button>
            <div class="player-container">
                <div class="player-wrapper">
                    <iframe 
                        id="videoPlayer"
                        class="player-iframe"
                        frameborder="0" 
                        allowfullscreen
                        loading="eager"
                        allow="autoplay; encrypted-media; fullscreen"
                    ></iframe>
                    <!-- Loading shimmer -->
                    <div class="player-loading" id="playerLoading">
                        <div class="player-spinner"></div>
                        <span>Loading stream…</span>
                    </div>
                </div>
            </div>
            <div class="movie-details">
                <h2 id="playerTitle"></h2>
                <p id="playerOverview"></p>
                <div class="movie-info">
                    <span id="playerRating" class="rating"></span>
                    <span id="playerYear" class="year"></span>
                </div>
            </div>
        </section>

        <!-- Series Detail Section -->
        <section class="series-detail-section" id="seriesDetailSection" style="display: none;">
            <button class="back-button" onclick="goBackFromSeriesDetail()">← Back</button>
            <div class="series-header" id="seriesHeader">
                <img id="seriesPoster" class="series-poster" src="" alt="">
                <div class="series-info-content">
                    <h2 id="seriesTitle"></h2>
                    <p id="seriesOverview"></p>
                    <div class="series-meta">
                        <span id="seriesRating" class="rating"></span>
                        <span id="seriesYear" class="year"></span>
                        <span id="seriesSeasonCount" class="year"></span>
                    </div>
                </div>
            </div>
            <div class="season-tabs" id="seasonTabs"></div>
            <div class="episodes-grid" id="episodesGrid"></div>
        </section>

        <!-- Movies Grid Section -->
        <section class="movies-section" id="moviesSection">
            <!-- Trending Section -->
            <h2 id="trendingTitle">🔥 Trending Movies & Series</h2>
            <div class="movies-grid" id="moviesGrid">
                <!-- Movies will be loaded here -->
            </div>
        </section>

        <!-- Loading Spinner -->
        <div class="loading" id="loading" style="display: none;">
            <div class="spinner"></div>
        </div>

        <!-- Error Message -->
        <div class="error-message" id="errorMessage" style="display: none;"></div>

        <!-- No Results -->
        <div class="no-results" id="noResults" style="display: none;">
            <p>No results found. Try another search.</p>
        </div>
    </div>

    <!-- Footer -->
    <footer class="footer">
        <p>&copy; 2026 MovieView. Powered by TMDB & Vidking Player. Stream movies & series responsibly.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
