<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MovieView - Stream Your Favorite Movies</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="container">
            <div class="nav-brand">
                <a href="#" onclick="goHome(); return false;"><h1>🎬 MovieView</h1></a>
            </div>
            <div class="nav-search">
                <input 
                    type="text" 
                    id="searchInput" 
                    class="search-input" 
                    placeholder="Search movies..."
                >
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="container">
        <!-- Player Section -->
        <section class="player-section" id="playerSection" style="display: none;">
            <button class="back-button" onclick="goBack()">← Back</button>
            <div class="player-container">
                <div class="player-wrapper">
                    <iframe 
                        id="videoPlayer"
                        class="player-iframe"
                        frameborder="0" 
                        allowfullscreen
                        allow="autoplay; encrypted-media"
                    ></iframe>
                </div>
            </div>
            <div class="movie-details">
                <h2 id="playerTitle"></h2>
                <p id="playerOverview"></p>
                <div class="movie-info">
                    <span id="playerRating" class="rating"></span>
                    <span id="playerYear" class="year"></span>
                </div>
            </div>
        </section>

        <!-- Movies Grid Section -->
        <section class="movies-section" id="moviesSection">

            <!-- Continue Watching -->
            <section class="reco-section" id="continueSection" style="display: none;">
                <div class="reco-header">
                    <h2>▶️ Continue Watching</h2>
                </div>
                <div class="reco-row" id="continueGrid"></div>
            </section>

            <!-- Recommended For You (hidden until user has watch data) -->
            <section class="reco-section" id="recoSection" style="display: none;">
                <div class="reco-header">
                    <h2>🎯 Recommended For You</h2>
                    <div class="reco-header-right">
                        <div class="profile-strength" id="profileStrength">
                            <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
                            <span class="strength-label" id="strengthLabel"></span>
                        </div>
                        <button class="reset-btn" onclick="resetRecommendations()" title="Reset all recommendation data">🗑️ Reset</button>
                    </div>
                </div>
                <div class="reco-row" id="recoGrid"></div>
            </section>

            <!-- Top Genre Picks -->
            <section class="reco-section" id="genrePicksSection" style="display: none;">
                <h2 id="genrePicksTitle">🔥 Top Picks in Action</h2>
                <div class="reco-row" id="genrePicksGrid"></div>
            </section>

            <!-- Because You Watched -->
            <section class="reco-section" id="becauseSection" style="display: none;">
                <h2 id="becauseTitle">Because You Watched...</h2>
                <div class="reco-row" id="becauseGrid"></div>
            </section>

            <!-- Your Top Genres -->
            <section class="reco-section" id="genreStatsSection" style="display: none;">
                <h2>📊 Your Taste Profile</h2>
                <div class="genre-bars" id="genreBars"></div>
            </section>

            <!-- Trending Section -->
            <h2 id="trendingTitle">🔥 Trending Movies</h2>
            <div class="movies-grid" id="moviesGrid">
                <!-- Movies will be loaded here -->
            </div>
        </section>

        <!-- Loading Spinner -->
        <div class="loading" id="loading" style="display: none;">
            <div class="spinner"></div>
        </div>

        <!-- Error Message -->
        <div class="error-message" id="errorMessage" style="display: none;"></div>

        <!-- No Results -->
        <div class="no-results" id="noResults" style="display: none;">
            <p>No movies found. Try another search.</p>
        </div>
    </div>

    <!-- Footer -->
    <footer class="footer">
        <p>&copy; 2026 MovieView. Powered by TMDB & Vidking Player. Stream responsibly.</p>
    </footer>

    <script src="recommend.js"></script>
    <script src="script.js"></script>
</body>
</html>
